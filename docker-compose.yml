services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/candidates_db
      - JWT_SECRET=z8K9p2W5xL4mN7qV1rT6yU3iO0pA9sD8fG7hJ6kL5
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
